// ─────────────────────────────────────────
// NavItem — mirrors NavItem.tsx API
// ─────────────────────────────────────────
function NavItem({ label, icon, selected = false, disabled = false, onClick }) {
  const color = useColor();
  const [hovered, setHovered] = useState(false);
  const [pressed, setPressed] = useState(false);

  const bg = selected
    ? color.bgInteractiveRunwaySelected
    : pressed || hovered ? color.bgSecondary
    : "transparent";

  const textColor = selected ? color.textInteractiveRunway
    : disabled ? color.textDisabled
    : color.textSecondary;

  const iconColor = selected ? color.iconInteractiveRunway
    : disabled ? color.iconDisabled
    : color.iconSecondary;

  return (
    <div
      role="button"
      tabIndex={disabled ? -1 : 0}
      aria-current={selected ? "page" : undefined}
      onClick={() => !disabled && onClick?.()}
      onMouseEnter={() => !disabled && setHovered(true)}
      onMouseLeave={() => { setHovered(false); setPressed(false); }}
      onMouseDown={() => !disabled && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick?.(); } }}
      style={{
        display: "flex", alignItems: "center", gap: 8,
        width: "100%", padding: 12,
        borderRadius: 8,
        backgroundColor: bg,
        color: textColor,
        fontFamily: "'Pretendard', sans-serif",
        fontSize: 14, fontWeight: 500, lineHeight: "16px",
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.6 : 1,
        userSelect: "none",
        transition: "background-color 0.1s ease",
        boxSizing: "border-box",
      }}
    >
      <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 24, height: 24, flexShrink: 0, color: iconColor }}>
        {icon}
      </span>
      <span style={{ flex: "1 0 0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
        {label}
      </span>
    </div>
  );
}

// ─────────────────────────────────────────
// Sidebar — mirrors Sidebar.tsx API
// ─────────────────────────────────────────
function Sidebar({ items, selectedKey, onSelect, header, footer, width = 200 }) {
  const color = useColor();
  return (
    <aside style={{
      display: "flex", flexDirection: "column",
      width, minWidth: width, height: "100%",
      backgroundColor: color.bgPrimary,
      borderRight: `1px solid ${color.borderSecondary}`,
      boxSizing: "border-box",
    }}>
      {header && (
        <div style={{ flexShrink: 0, borderBottom: `1px solid ${color.borderTertiary}` }}>
          {header}
        </div>
      )}
      <nav style={{
        flex: "1 1 auto", overflowX: "hidden", overflowY: "auto",
        padding: "8px 12px",
        display: "flex", flexDirection: "column", gap: 2,
      }}>
        {items.map(item => (
          <NavItem
            key={item.key}
            label={item.label}
            icon={item.icon}
            selected={item.key === selectedKey}
            disabled={item.disabled}
            onClick={() => onSelect?.(item.key)}
          />
        ))}
      </nav>
      {footer && (
        <div style={{ padding: "8px 12px 16px", flexShrink: 0, borderTop: `1px solid ${color.borderTertiary}` }}>
          {footer}
        </div>
      )}
    </aside>
  );
}

// ─────────────────────────────────────────
// GlobalNav — mirrors GlobalNav.tsx API
// ─────────────────────────────────────────
function GlobalNav({ breadcrumbs = [], actions = [], user }) {
  const color = useColor();

  return (
    <header style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      width: "100%", height: 48,
      padding: "0 24px",
      backgroundColor: color.bgPrimary,
      borderBottom: `1px solid ${color.borderSecondary}`,
      boxSizing: "border-box", flexShrink: 0,
    }}>
      {/* Left: breadcrumbs */}
      <nav aria-label="breadcrumb" style={{ display: "flex", alignItems: "center", flex: "1 0 0", minWidth: 0 }}>
        {breadcrumbs.map((item, i) => (
          <React.Fragment key={i}>
            {i > 0 && (
              <span aria-hidden="true" style={{
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                width: 24, height: 24, flexShrink: 0, opacity: 0.7,
              }}>
                <span style={{ display: "block", width: 1, height: 16, backgroundColor: color.iconSecondary, borderRadius: 16, transform: "rotate(30deg)" }} />
              </span>
            )}
            <span style={{
              display: "inline-flex", alignItems: "center", gap: 4,
              padding: "4px 8px",
              opacity: i === breadcrumbs.length - 1 ? 1 : 0.7,
              cursor: item.onClick ? "pointer" : "default",
              borderRadius: 4,
              flexShrink: 0,
            }} onClick={item.onClick}>
              {item.icon && (
                <span style={{ display: "inline-flex", alignItems: "center", width: 24, height: 24 }}>
                  {item.icon}
                </span>
              )}
              <span style={{
                fontFamily: "'Pretendard', sans-serif", fontSize: 14,
                fontWeight: i === breadcrumbs.length - 1 ? 500 : 400,
                lineHeight: "16px", color: color.textInteractiveSecondary,
                whiteSpace: "nowrap",
              }}>{item.label}</span>
            </span>
          </React.Fragment>
        ))}
      </nav>

      {/* Right: actions + user */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
        {actions.map(action => (
          <GnbActionBtn key={action.key} action={action} />
        ))}
        {user && <GnbUserBtn user={user} />}
      </div>
    </header>
  );
}

function GnbActionBtn({ action }) {
  const color = useColor();
  const [hovered, setHovered] = useState(false);
  return (
    <button
      type="button"
      aria-label={action.label}
      onClick={action.onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 32, height: 32, borderRadius: 24,
        border: "none", backgroundColor: hovered ? color.bgTertiary : "transparent",
        cursor: "pointer", padding: 0, flexShrink: 0,
        transition: "background 0.12s", color: color.iconSecondary,
      }}
    >{action.icon}</button>
  );
}

function GnbUserBtn({ user }) {
  return (
    <button type="button" aria-label="User profile" onClick={user.onClick} style={{
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      width: 32, height: 32, border: "none", background: "none",
      cursor: "pointer", padding: 0, flexShrink: 0,
    }}>
      <span style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 24, height: 24, borderRadius: "50%",
        backgroundColor: user.avatarColor ?? "#dc2626",
        fontFamily: "'Pretendard', sans-serif",
        fontSize: 10, fontWeight: 600, lineHeight: 1,
        color: "#ffffff", flexShrink: 0, letterSpacing: "0.02em",
      }}>
        {user.initial ?? "?"}
      </span>
    </button>
  );
}

// ─────────────────────────────────────────
// GridCard Component
// ─────────────────────────────────────────
function GridCard({ title, desc, logo, checked, focused: forceFocused, onClick }) {
  const color = useColor();
  const [hovered, setHovered] = useState(false);
  const [pressed, setPressed] = useState(false);
  const [focused, setFocused] = useState(false);

  const isActive = focused || forceFocused;

  const getBg = () => {
    if (checked && pressed)  return "#bedbff";
    if (checked && hovered)  return "#dbeafe";
    if (checked)             return color.bgDrawxSelected;
    if (pressed)             return color.bgTertiary;
    if (hovered)             return color.bgSecondary;
    return "transparent";
  };

  return (
    <div
      role="button" tabIndex={0} aria-pressed={checked}
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => { setHovered(false); setPressed(false); }}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick?.(); } }}
      style={{
        display: "flex", flexDirection: "column", gap: 24,
        padding: "8px 8px 24px",
        borderRadius: 16,
        backgroundColor: getBg(),
        outline: isActive ? `2px solid ${color.borderDrawxFocusRing}` : "none",
        outlineOffset: isActive ? -2 : 0,
        cursor: "pointer",
        transition: "background-color 0.15s ease",
        overflow: "hidden",
        userSelect: "none",
      }}
    >
      {/* Image slot — 293:195 (matches GridCard component) */}
      <div style={{
        width: "100%", aspectRatio: "293 / 195",
        backgroundColor: color.bgSecondary,
        borderRadius: 16, overflow: "hidden",
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
      }}>
        <img src={logo} alt={title}
          style={{ maxWidth: "65%", maxHeight: "41%", objectFit: "contain", display: "block" }}
          onError={e => { e.target.style.display = "none"; }}
        />
      </div>

      {/* Text */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
        <p style={{
          fontFamily: "'Pretendard', sans-serif", fontSize: 16, fontWeight: 600,
          lineHeight: "24px", color: color.textPrimary,
          overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", margin: 0,
        }}>{title}</p>
        {desc && (
          <p style={{
            fontFamily: "'Pretendard', sans-serif", fontSize: 14, fontWeight: 400,
            lineHeight: "20px", color: color.textSecondary, margin: 0,
            display: "-webkit-box", WebkitLineClamp: 2,
            WebkitBoxOrient: "vertical", overflow: "hidden",
          }}>{desc}</p>
        )}
      </div>
    </div>
  );
}
