function CheckmarkIcon() {
  return (
    <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
      <path d="M1 3.5L3.8 6.5L9 1" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}
function IndeterminateMarkIcon() {
  return (
    <svg width="10" height="2" viewBox="0 0 10 2" fill="none">
      <path d="M1 1H9" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function Checkbox({ checked: ctrl, defaultChecked = false, onChange, disabled = false, id: extId, style }) {
  const color = useColor();
  const autoId = useId();
  const id = extId ?? autoId;
  const [internal, setInternal] = useState(defaultChecked);
  const isControlled = ctrl !== undefined;
  const checked = isControlled ? ctrl : internal;
  const isChecked  = checked === true;
  const isIndet    = checked === "indeterminate";
  const [hovered, setHovered] = useState(false);

  const handleChange = () => {
    if (disabled) return;
    const next = isChecked || isIndet ? false : true;
    if (!isControlled) setInternal(next);
    onChange?.(next);
  };

  const bg = disabled ? color.bgDisabled
    : (isChecked || isIndet) ? color.bgInteractiveRunway
    : color.bgPrimary;

  const border = disabled ? color.borderSecondary
    : (isChecked || isIndet) ? color.bgInteractiveRunway
    : hovered ? color.borderHovered
    : color.borderPrimary;

  return (
    <label
      htmlFor={id}
      onMouseEnter={() => !disabled && setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ display: "inline-flex", alignItems: "center", cursor: disabled ? "not-allowed" : "pointer", ...style }}
    >
      <input
        type="checkbox" id={id} checked={isChecked} disabled={disabled} onChange={handleChange}
        aria-checked={isIndet ? "mixed" : isChecked}
        style={{ position: "absolute", opacity: 0, width: 0, height: 0, margin: 0 }}
      />
      <span aria-hidden="true" style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 16, height: 16, flexShrink: 0, borderRadius: 4,
        border: `1px solid ${border}`, backgroundColor: bg,
        transition: "background-color 0.15s, border-color 0.15s", boxSizing: "border-box",
      }}>
        {isIndet   && <IndeterminateMarkIcon />}
        {isChecked && <CheckmarkIcon />}
      </span>
    </label>
  );
}

// ─────────────────────────────────────────
// StatusChip (Design System tokens)
// ─────────────────────────────────────────
function StatusChip({ connected }) {
  const color = useColor();
  const STATUS_TOKENS = {
    success: { bg: color.bgSuccessSubtle, text: color.textPrimary,  dot: color.iconSuccess,  dotShape: "circle", label: "Connected"    },
    neutral: { bg: color.bgDisabled,      text: color.textDisabled, dot: color.textDisabled, dotShape: "square", label: "Disconnected" },
  };
  const t = connected ? STATUS_TOKENS.success : STATUS_TOKENS.neutral;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      height: 24, padding: "4px 8px", borderRadius: 9999,
      backgroundColor: t.bg,
      fontFamily: "'Pretendard', sans-serif",
      fontSize: 12, fontWeight: 500, lineHeight: "16px",
      color: t.text, whiteSpace: "nowrap",
    }}>
      <span style={{
        width: 6, height: 6, flexShrink: 0,
        backgroundColor: t.dot,
        borderRadius: t.dotShape === "square" ? "1.5px" : "50%",
      }} />
      {t.label}
    </span>
  );
}

// email: firstname.lastname@domain → firstname앞자 + lastname앞자 (e.g. "gildong.hong" → "GH")
function getInitials(email) {
  const local = email.split('@')[0];
  const parts = local.split('.');
  return parts.length >= 2
    ? (parts[0][0] + parts[1][0]).toUpperCase()
    : local.slice(0, 2).toUpperCase();
}

function slugify(str) {
  return str
    .toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^\p{L}\p{N}-]/gu, '')   // keep unicode letters/numbers (한글, etc.) + hyphens
    .replace(/-+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function validateName(name) {
  if (!name.trim()) return "Name is required";
  if (name.length > 128) return "Name must not exceed 128 characters";
  return null;
}

function validateConnId(id, existingIds = []) {
  if (!id) return "Connection ID is required";
  if (id.length < 3) return "Connection ID must be at least 3 characters";
  if (!/^[a-z0-9-]+$/.test(id)) return "Connection ID must contain only lowercase letters, numbers, and hyphens";
  if (!/^[a-z0-9]/.test(id)) return "Connection ID must start with a lowercase letter or number";
  if (!/[a-z0-9]$/.test(id)) return "Connection ID must end with a lowercase letter or number";
  if (existingIds.includes(id)) return "Connection ID already exists. Please choose a different ID.";
  return null;
}

// CreateDrawer
function CreateDrawer({ open, onClose, existingIds }) {
  const color = useColor();

  const [name, setName]         = useState("");
  const [connId, setConnId]     = useState("");
  const [connIdManual, setConnIdManual] = useState(false);
  const [desc, setDesc]         = useState("");
  const [host, setHost]         = useState("");
  const [port, setPort]         = useState("");
  const [database, setDatabase] = useState("");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [nameTouched, setNameTouched]     = useState(false);
  const [connIdTouched, setConnIdTouched] = useState(false);

  // Auto-generate Connection ID from Name
  const handleNameChange = (v) => {
    setName(v);
    if (!connIdManual) setConnId(slugify(v).slice(0, 63).replace(/-+$/, ''));
  };
  const handleConnIdChange = (v) => {
    setConnId(v);
    setConnIdManual(true);
  };

  const nameErr   = (nameTouched   || submitted) ? validateName(name) : null;
  const connIdErr = (connIdTouched || submitted) ? validateConnId(connId, existingIds) : null;

  const handleSubmit = () => {
    setSubmitted(true);
    if (validateName(name) || validateConnId(connId, existingIds)) return;
    // Success — close and reset
    onClose();
    setName(""); setConnId(""); setConnIdManual(false);
    setDesc(""); setHost(""); setPort(""); setDatabase(""); setUsername(""); setPassword("");
    setSubmitted(false); setNameTouched(false); setConnIdTouched(false);
  };

  const handleClose = () => {
    onClose();
    setName(""); setConnId(""); setConnIdManual(false);
    setDesc(""); setHost(""); setPort(""); setDatabase(""); setUsername(""); setPassword("");
    setSubmitted(false); setNameTouched(false); setConnIdTouched(false);
  };

  return (
    <div
      style={{
        position: "fixed", inset: 0, zIndex: 400, display: "flex", justifyContent: "flex-end",
        pointerEvents: open ? "auto" : "none",
      }}
      onClick={handleClose}
    >
      {/* Backdrop */}
      <div style={{
        position: "absolute", inset: 0, background: "rgba(0,0,0,0.32)",
        opacity: open ? 1 : 0,
        transition: "opacity 0.35s cubic-bezier(0.32,0.72,0,1)",
        pointerEvents: "none",
      }} />

      {/* Panel */}
      <div
        onClick={e => e.stopPropagation()}
        style={{
          position: "relative", zIndex: 1,
          width: 640, height: "100vh",
          background: color.bgPrimary,
          display: "flex", flexDirection: "column",
          boxShadow: "-4px 0 24px rgba(0,0,0,0.12)",
          transform: open ? "translateX(0)" : "translateX(100%)",
          transition: "transform 0.42s cubic-bezier(0.32,0.72,0,1)",
          willChange: "transform",
        }}
      >
        {/* Header */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "16px 24px", borderBottom: `1px solid ${color.borderPrimary}`,
          flexShrink: 0,
        }}>
          <span style={{ fontSize: 18, fontWeight: 600, lineHeight: "24px", color: color.textPrimary, fontFamily: "'Pretendard', sans-serif" }}>
            Create Data connection
          </span>
          <button onClick={handleClose} style={{ display: "flex", border: "none", background: "none", cursor: "pointer", padding: 4, borderRadius: 4, color: color.iconSecondary }}>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </button>
        </div>

        {/* Body — scrollable */}
        <div style={{ flex: 1, overflowY: "auto", padding: "24px" }}>
          {/* Basic Information */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 16, fontWeight: 600, lineHeight: "24px", color: color.textPrimary, fontFamily: "'Pretendard', sans-serif" }}>
                Basic Information
              </span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <DrawerField
                label="Name"
                value={name}
                onChange={handleNameChange}
                onBlur={() => setNameTouched(true)}
                maxLength={128}
                placeholder="e.g. Production Aurora DB"
                error={nameErr}
              />
              <DrawerField
                label="ID"
                value={connId}
                onChange={handleConnIdChange}
                onBlur={() => setConnIdTouched(true)}
                maxLength={63}
                placeholder="production-aurora-db"
                error={connIdErr}
              />
              <DrawerTextArea
                label="Description (Optional)"
                value={desc}
                onChange={setDesc}
                maxLength={512}
                placeholder="Describe what this connection is used for"
              />
            </div>
          </div>

          {/* Connection type */}
          <div>
            <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 16, fontWeight: 600, lineHeight: "24px", color: color.textPrimary, fontFamily: "'Pretendard', sans-serif" }}>
                Connection type
              </span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <DrawerField label="Host"              value={host}     onChange={setHost}     placeholder="db.example.com" />
              <DrawerField label="Port"              value={port}     onChange={setPort}     placeholder="5432" />
              <DrawerField label="Database / Schema" value={database} onChange={setDatabase} placeholder="my_database.public" />
              <DrawerField label="User name"         value={username} onChange={setUsername} placeholder="db_user" />
              <DrawerField label="Password"          value={password} onChange={setPassword} placeholder="Enter password" type="password" />
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8,
          padding: "16px 24px", borderTop: `1px solid ${color.borderPrimary}`,
          flexShrink: 0, background: color.bgPrimary,
        }}>
          <button
            onClick={handleClose}
            style={{
              height: 36, padding: "8px 14px", borderRadius: 6, cursor: "pointer",
              border: `1px solid ${color.borderSecondary}`, background: color.bgPrimary,
              fontSize: 14, fontWeight: 500, color: color.textSecondary,
              fontFamily: "'Pretendard', sans-serif",

          <button
            onClick={handleSubmit}
            style={{
              height: 36, padding: "8px 14px", borderRadius: 6, cursor: "pointer",
              border: "none", background: color.bgInteractiveRunway,
              fontSize: 14, fontWeight: 500, color: "#ffffff",
              fontFamily: "'Pretendard', sans-serif",
            }}
          >Create</button>
        </div>
      </div>
    </div>
  );
}

const CONNECTIONS = [
  { name: "Aurora DB",     connId: "gcp-conn-001",   host: "analytics-db.internal:5432",       connected: false },
  { name: "Cassandra",     connId: "aws-conn-002",   host: "us-east-1",                        connected: true  },
  { name: "Athena Query",  connId: "azure-conn-003", host: "http://mlflow.internal:5000",      connected: true  },
  { name: "BigQuery",      connId: "ms-sql-004",     host: "firehose.internal:8080",           connected: false },
  { name: "DynamoDB",      connId: "maria-db-005",   host: "us-west-2",                        connected: false },
  { name: "ElasticSearch", connId: "vertica-006",    host: "ws://spark.internal:4040",         connected: true  },
  { name: "HBase",         connId: "hana-007",       host: "jdbc:oracle:thin:@localhost:1521:xe", connected: false },
  { name: "Kafka",         connId: "redshift-008",   host: "localhost:5432",                   connected: true  },
  { name: "Kinesis",       connId: "snowflake-009",  host: "10.1.1.5:9200",                    connected: false },
  { name: "MongoDB",       connId: "teradata-010",   host: "zookeeper.internal:2181",          connected: true  },
];

// ─────────────────────────────────────────
// Table Row
// ─────────────────────────────────────────
function TableRow({ row, isSelected, isLast, menuOpen, onToggle, onMenuToggle }) {
  const color = useColor();
  const [hov, setHov] = useState(false);
  const bg = isSelected ? color.bgInteractiveSelected : hov ? color.bgSecondary : color.bgPrimary;
  const borderColor = isLast ? "transparent" : color.borderTertiary;

  const tdBase = {
    padding: "12px 12px", verticalAlign: "middle",
    borderBottom: `1px solid ${borderColor}`,
    fontFamily: "'Pretendard', sans-serif",
    fontSize: 14, lineHeight: "16px",
  };

  return (
    <tr
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{ background: bg, transition: "background 0.1s" }}
    >
      <td style={{ padding: "0 12px", verticalAlign: "middle", borderBottom: `1px solid ${borderColor}`, width: 44 }}>
        <Checkbox checked={isSelected} onChange={onToggle} />
      </td>
      <td style={{ ...tdBase, fontWeight: 500, color: color.textPrimary }}>{row.name}</td>
      <td style={{ ...tdBase, color: color.textSecondary, fontWeight: 400 }}>{row.connId}</td>
      <td style={{ ...tdBase, color: color.textSecondary, fontWeight: 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 0 }}>
        {row.host}
      </td>
      <td style={{ ...tdBase }}>
        <StatusChip connected={row.connected} />
      </td>
      <td style={{ padding: "8px", verticalAlign: "middle", borderBottom: `1px solid ${borderColor}`, width: 44 }}>
        <ActionMenu open={menuOpen} rowId={row.name} onMenuToggle={onMenuToggle} rowHovered={hov} />
      </td>
    </tr>
  );
}

// ─────────────────────────────────────────
// App
// ─────────────────────────────────────────
function App() {
  const [isDark, setIsDark] = useState(false);
  const theme = isDark ? colorDark : colorLight;

  const [settingOpen, setSettingOpen] = useState(true);
  const [selectedRows, setSelectedRows] = useState(new Set(["Athena Query"]));
  const [openMenu, setOpenMenu] = useState(null);
  const [currentPage, setCurrentPage] = useState(1);
  const [profileOpen, setProfileOpen] = useState(false);
  const avatarWrapperRef = useRef(null);
  const [drawerOpen, setDrawerOpen] = useState(false);

  useEffect(() => {
    if (!profileOpen) return;
    const close = (e) => {
      if (avatarWrapperRef.current && !avatarWrapperRef.current.contains(e.target)) {
        setProfileOpen(false);
      }
    };
    const t = setTimeout(() => document.addEventListener('click', close), 0);
    return () => { clearTimeout(t); document.removeEventListener('click', close); };
  }, [profileOpen]);

  useEffect(() => {
    document.body.style.background = theme.bgPrimary;
    document.body.style.color = theme.textPrimary;
  }, [isDark]);

  const allSel  = selectedRows.size === CONNECTIONS.length;
  const someSel = selectedRows.size > 0 && !allSel;

  const toggleAll = (v) => setSelectedRows(v ? new Set(CONNECTIONS.map(c => c.name)) : new Set());
  const toggleRow = (name, v) => setSelectedRows(prev => {
    const s = new Set(prev); v ? s.add(name) : s.delete(name); return s;
  });
  const toggleMenu = (id) => setOpenMenu(p => p === id ? null : id);

  return (
    <ColorContext.Provider value={theme}>
    <div
      style={{ display: "flex", height: "100vh", background: theme.bgPrimary }}
      onClick={() => setOpenMenu(null)}
    >
      {/* ═══ SIDEBAR ═══ */}
      <aside style={{
        width: 220, flexShrink: 0, display: "flex", flexDirection: "column",
        background: theme.bgSecondary, borderRight: `1px solid ${theme.borderTertiary}`,
        height: "100vh", overflowY: "auto", overflowX: "hidden",
      }}>
        {/* Logo area */}
        <div style={{
          display: "flex", alignItems: "center", gap: 8,
          padding: "16px 16px 12px", flexShrink: 0,
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 5.3, background: theme.bgProject,
            display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
          }}>
            <span style={{ fontSize: 16, fontWeight: 600, color: theme.textInverse, lineHeight: 1 }}>D</span>
          </div>
          <span style={{
            flex: 1, fontSize: 14, fontWeight: 600, lineHeight: "16px",
            color: theme.textPrimary, fontFamily: "'Pretendard', sans-serif",
          }}>Data studio</span>
          <button style={{ display: "flex", background: "none", border: "none", cursor: "pointer", padding: 2 }}>
            <IconSidebar size={20} color={theme.iconSecondary} />
          </button>
        </div>

        {/* Project nav item */}
        <div style={{ padding: "0 8px 4px" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center", padding: "10px 12px" }}>
            <div style={{
              width: 32, height: 32, borderRadius: 5.3, background: theme.bgWarningSubtle,
              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
            }}>
              <IconFolderFill size={18} color={theme.iconWarning} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 10, color: theme.textTertiary, lineHeight: "14px", fontFamily: "'Pretendard', sans-serif" }}>Projects</div>
              <div style={{ fontSize: 14, fontWeight: 500, color: theme.textPrimary, lineHeight: "16px", fontFamily: "'Pretendard', sans-serif" }}>NLP Models</div>
            </div>
          </div>

          <NavItem icon={<IconCatalog />}     label="Catalog" />
          <NavItem icon={<IconApplication />} label="Application" />
          <NavItem icon={<IconStorage />}     label="Storage" />
          <NavItem icon={<IconInference />}   label="Inference Endpoint" />
          <NavItem icon={<IconMonitoring />}  label="Monitoring" />
          <NavItem icon={<IconMember />}      label="Member" />
          <NavItem
            icon={<IconSetting />} label="Setting"
            hasChevron expanded={settingOpen}
            onClick={() => setSettingOpen(v => !v)}
          />
          {settingOpen && (
            <div style={{ borderRadius: 8, overflow: "hidden" }}>
              <SubNavItem label="General" />
              <SubNavItem label="Role" />
              <SubNavItem label="Data connection" active />
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ marginTop: "auto", padding: "12px 16px", borderTop: `1px solid ${theme.borderTertiary}`, flexShrink: 0 }}>
          <span style={{ fontSize: 11, color: theme.textDisabled, fontFamily: "'Pretendard', sans-serif" }}>Runway v1.5.0</span>
        </div>
      </aside>

      {/* ═══ MAIN ═══ */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>

        {/* GNB — Figma: GNB_navigation (node 9303-3531) */}
        <header style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 24px", height: 48, flexShrink: 0,
          background: theme.bgPrimary,
        }}>
          {/* ── Breadcrumbs ── */}
          <nav style={{ display: "flex", alignItems: "center", flex: "1 0 0", height: "100%" }}>

            {/* Item 1: folder_open + "NLP Models" — opacity 0.7 */}
            <GnbBreadcrumbItem icon={<IconFolderOpen size={20} color={theme.textInteractiveSecondary} />} label="NLP Models" />
            <GnbDivider />

            {/* Item 2: setting + "Label" — opacity 0.7 */}
            <GnbBreadcrumbItem icon={<IconSetting size={20} color={theme.textInteractiveSecondary} />} label="Label" />
            <GnbDivider />

            {/* Item 3: current — full opacity, Medium weight */}
            <GnbBreadcrumbItem label="Data connections" isCurrent />

          </nav>

          {/* ── Right actions ── */}
          <div style={{ display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
            {/* Dark mode toggle */}
            <GnbActionButton onClick={(e) => { e.stopPropagation(); setIsDark(d => !d); }}>
              {isDark
                ? <IconSun  size={20} color={theme.iconSecondary} />
                : <IconMoon size={20} color={theme.iconSecondary} />
              }
            </GnbActionButton>
            {/* Book icon button — 32×32 rounded */}
            <GnbActionButton>
              <IconBook size={24} color={theme.iconSecondary} />
            </GnbActionButton>
            {/* Avatar button + Profile Popover */}
            <div ref={avatarWrapperRef} style={{ position: "relative" }}>
              <GnbAvatarButton
                initial={getInitials(CURRENT_USER.email)}
                onClick={() => setProfileOpen(p => !p)}
              />
              {profileOpen && (
                <ProfilePopover
                  initial={getInitials(CURRENT_USER.email)}
                  name={CURRENT_USER.name}
                  email={CURRENT_USER.email}
                />
              )}
            </div>
          </div>
        </header>

        {/* Page content */}
        <main style={{ flex: 1, overflow: "auto", padding: "32px 32px 24px" }}>
          {/* Title row */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20 }}>
            <div>
              <h1 style={{
                fontSize: 24, fontWeight: 600, lineHeight: "32px",
                color: theme.textPrimary, marginBottom: 6,
                fontFamily: "'Pretendard', sans-serif",
              }}>Data connections</h1>
              <p style={{
                fontSize: 14, fontWeight: 400, lineHeight: "16px",
                color: theme.textSecondary,
                fontFamily: "'Pretendard', sans-serif",
              }}>
                Manage reusable connections scoped to this project for DataFlow Builder (Airflow) and Platform Apps (Jupyter IDE).
              </p>
            </div>
            <Button icon={<IconCreate size={14} color={theme.textInverse} />} onClick={(e) => { e.stopPropagation(); setDrawerOpen(true); }} testId="create-btn">Create</Button>
          </div>

          {/* Table */}
          <div style={{
            border: `1px solid ${theme.borderPrimary}`,
            borderRadius: 8, overflow: "hidden", background: theme.bgPrimary,
          }}>
            <table style={{ width: "100%", borderCollapse: "collapse", tableLayout: "fixed", minWidth: 600 }}>
              <colgroup>
                <col style={{ width: 44 }} />
                <col style={{ minWidth: 120 }} />
                <col style={{ width: 160 }} />
                <col style={{ width: 260 }} />
                <col style={{ width: 140 }} />
                <col style={{ width: 44 }} />
              </colgroup>
              <thead>
                <tr>
                  <th style={{
                    padding: "10px 12px", width: 44,
                    borderBottom: `1px solid ${theme.borderPrimary}`, background: theme.bgSecondary,
                  }}>
                    <Checkbox
                      checked={allSel ? true : someSel ? "indeterminate" : false}
                      onChange={toggleAll}
                    />
                  </th>
                  <ThCell sortable>Name</ThCell>
                  <ThCell sortable>Connection ID</ThCell>
                  <ThCell sortable>Host / Endpoint</ThCell>
                  <ThCell>Status</ThCell>
                  <th style={{ borderBottom: `1px solid ${theme.borderPrimary}`, background: theme.bgSecondary }} />
                </tr>
              </thead>
              <tbody>
                {CONNECTIONS.map((row, idx) => (
                  <TableRow
                    key={row.name}
                    row={row}
                    isSelected={selectedRows.has(row.name)}
                    isLast={idx === CONNECTIONS.length - 1}
                    menuOpen={openMenu === row.name}
                    onToggle={(v) => toggleRow(row.name, v)}
                    onMenuToggle={toggleMenu}
                  />
                ))}
              </tbody>
            </table>

            {/* Pagination */}
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "center",
              padding: "10px 16px", borderTop: `1px solid ${theme.borderPrimary}`,
              background: theme.bgSecondary,
            }}>
              <Pagination current={currentPage} onChange={setCurrentPage} />
            </div>
          </div>
        </main>
      </div>
    </div>
    <CreateDrawer
      open={drawerOpen}
      onClose={() => setDrawerOpen(false)}
      existingIds={CONNECTIONS.map(c => c.connId)}
    />
    </ColorContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
