// ─────────────────────────────────────────
// NavItem / SubNavItem
// ─────────────────────────────────────────
function NavItem({ icon, label, active = false, disabled = false, hasChevron = false, expanded = false, onClick }) {
  const c = useColor();
  const [hov, setHov] = useState(false);
  const isExpandedParent = hasChevron && expanded;
  const ic = active ? c.iconRunway : disabled ? c.iconDisabled : c.iconSecondary;
  const tc = active ? c.textInteractiveRunway : disabled ? c.textDisabled : isExpandedParent ? c.textSecondaryPressed : c.textSecondary;
  return (
    <div
      role="button" tabIndex={disabled ? -1 : 0}
      onClick={() => !disabled && onClick?.()}
      onMouseEnter={() => !disabled && setHov(true)}
      onMouseLeave={() => setHov(false)}
      onKeyDown={e => { if (!disabled && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); onClick?.(); } }}
      style={{
        display: "flex", alignItems: "center", gap: 8,
        padding: "10px 12px", borderRadius: 8, cursor: disabled ? "not-allowed" : "pointer",
        width: "100%", opacity: disabled ? 0.6 : 1,
        background: active ? c.bgInteractiveSelected : hov ? c.bgTertiary : "transparent",
        transition: "background 0.1s", userSelect: "none",
      }}
    >
      <span style={{ display: "flex", width: 24, height: 24, alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
        {React.cloneElement(icon, { size: 20, color: ic })}
      </span>
      <span style={{ flex: 1, fontSize: 14, fontWeight: 500, lineHeight: "16px", color: tc, fontFamily: "'Pretendard', sans-serif", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
        {label}
      </span>
      {hasChevron && (expanded ? <IconChevronDown size={16} color={ic} /> : <IconChevronRight size={16} color={ic} />)}
    </div>
  );
}

function SubNavItem({ label, active = false, onClick }) {
  const c = useColor();
  const [hov, setHov] = useState(false);
  return (
    <div
      role="button" tabIndex={0}
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display: "flex", alignItems: "center",
        height: 36, padding: "6px 12px 6px 48px", cursor: "pointer",
        background: active ? c.bgInteractiveSelected : hov ? c.bgSecondary : c.bgTertiary,
        transition: "background 0.1s",
      }}
    >
      <span style={{ fontSize: 12, fontWeight: 500, lineHeight: "16px", color: active ? c.textInteractiveRunway : c.textInteractiveSecondary, fontFamily: "'Pretendard', sans-serif", whiteSpace: "nowrap" }}>
        {label}
      </span>
    </div>
  );
}

              <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                <GNB label={`NLP Models / ${projNav.replace(/^\w/, c => c.toUpperCase()).replace(/-/g, " ")}`} user="GH" />
                <ContentArea title={projNav.replace(/^\w/, c => c.toUpperCase()).replace(/-/g, " ")} />
              </div>
            </div>

            {/* Spec */}
            <div style={{ marginTop: 24, display: "flex", gap: 16, flexWrap: "wrap" }}>
              {[
                { label: "Background", value: "bgSecondary (#f9fafb)" },
                { label: "Border", value: "borderTertiary (#f3f4f6)" },
                { label: "Project Header", value: "Folder icon + project name" },
                { label: "Items", value: "Catalog, Application, Storage, Inference, Monitoring, Member, Setting" },
                { label: "Sub-items", value: "General, Role, Data connection" },
              ].map(item => (
                <div key={item.label} style={{
                  padding: "10px 16px", borderRadius: 8, backgroundColor: theme.bgSecondary,
                  border: `1px solid ${theme.borderTertiary}`,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: theme.textTertiary, fontFamily: "'Pretendard', sans-serif", marginBottom: 2 }}>{item.label}</div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: theme.textPrimary, fontFamily: "'Source Code Pro', monospace" }}>{item.value}</div>
                </div>
              ))}
            </div>
          </section>

          {/* ── Section 3: Side by Side ── */}
          <section style={{
            backgroundColor: theme.bgPrimary,
            border: `1px solid ${theme.borderPrimary}`,
            borderRadius: 12, padding: 32,
          }}>
            <SectionHeader
              title="Comparison"
              desc="Workspace LNB vs Project LNB side by side. Notice the different backgrounds, header styles, and navigation depths."
            />

            <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
              {/* Workspace LNB standalone */}
              <div>
                <div style={{ fontFamily: "'Pretendard', sans-serif", fontSize: 13, fontWeight: 600, color: theme.textSecondary, marginBottom: 12 }}>
                  Workspace LNB
                </div>
                <div style={{ width: 220, height: 440, border: `1px solid ${theme.borderPrimary}`, borderRadius: 12, overflow: "hidden" }}>
                  <WorkspaceLNB selectedKey="projects" onSelect={() => {}} />
                </div>
              </div>

              {/* Project LNB standalone */}
              <div>
                <div style={{ fontFamily: "'Pretendard', sans-serif", fontSize: 13, fontWeight: 600, color: theme.textSecondary, marginBottom: 12 }}>
                  Project LNB
                </div>
                <div style={{ width: 220, height: 440, border: `1px solid ${theme.borderPrimary}`, borderRadius: 12, overflow: "hidden" }}>
                  <ProjectLNB
                    selectedKey="data-connection"
                    onSelect={() => {}}
                    settingOpen={true}
                    onSettingToggle={() => {}}
                  />
                </div>
              </div>

              {/* Key differences */}
              <div style={{ flex: "1 1 300px" }}>
                <div style={{ fontFamily: "'Pretendard', sans-serif", fontSize: 13, fontWeight: 600, color: theme.textSecondary, marginBottom: 12 }}>
                  Key Differences
                </div>
                <table style={{
                  width: "100%", borderCollapse: "collapse",
                  fontFamily: "'Pretendard', sans-serif", fontSize: 13,
                }}>
                  <thead>
                    <tr style={{ borderBottom: `2px solid ${theme.borderPrimary}` }}>
                      <th style={{ textAlign: "left", padding: "8px 12px", color: theme.textTertiary, fontWeight: 600 }}></th>
                      <th style={{ textAlign: "left", padding: "8px 12px", color: theme.textTertiary, fontWeight: 600 }}>Workspace</th>
                      <th style={{ textAlign: "left", padding: "8px 12px", color: theme.textTertiary, fontWeight: 600 }}>Project</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      ["Background", "bgSecondary (gray-50)", "bgSecondary (gray-50)"],
                      ["Header", "Workspace logo + name", "Workspace + Project folder"],
                      ["Sidebar toggle", "Present", "Present"],
                      ["Sub-navigation", "None", "Setting > General, Role, etc."],
                      ["Nav items", "5 items (flat)", "7 items + sub-menu"],
                      ["Border", "borderTertiary", "borderTertiary"],
                    ].map(([key, ws, proj], i) => (
                      <tr key={i} style={{ borderBottom: `1px solid ${theme.borderTertiary}` }}>
                        <td style={{ padding: "8px 12px", color: theme.textSecondary, fontWeight: 500 }}>{key}</td>
                        <td style={{ padding: "8px 12px", color: theme.textPrimary }}>{ws}</td>
                        <td style={{ padding: "8px 12px", color: theme.textPrimary }}>{proj}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </section>

        </div>
      </div>
    </ColorCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
